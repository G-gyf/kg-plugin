<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mechanism Workflow Guide</title>
  <style>
    :root {
      --bg: #f4efe6;
      --paper: #fffaf1;
      --ink: #1f2a2e;
      --muted: #5c696d;
      --line: #dbcdb5;
      --accent: #b24c2d;
      --accent-soft: rgba(178, 76, 45, 0.12);
      --teal: #235b63;
      --shadow: 0 18px 40px rgba(33, 39, 45, 0.08);
      --mono: "Consolas", "SFMono-Regular", monospace;
      --sans: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(178,76,45,0.08), transparent 28%),
        linear-gradient(180deg, #f8f2e8 0%, var(--bg) 100%);
    }
    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 20px 80px;
      display: grid;
      gap: 20px;
    }
    .hero, .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 28px;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -60px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(35,91,99,0.14), rgba(178,76,45,0.08));
    }
    h1, h2, h3 { margin: 0 0 12px; }
    h1 { font-size: 34px; letter-spacing: 0.02em; }
    h2 { font-size: 22px; }
    .sub {
      max-width: 780px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }
    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: 280px 1fr;
    }
    .sidebar, .main {
      display: grid;
      gap: 20px;
    }
    .card { padding: 22px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(35,91,99,0.18);
      background: rgba(35,91,99,0.08);
      color: var(--teal);
      font-size: 12px;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    .list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .list li {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.7);
      line-height: 1.6;
      font-size: 14px;
    }
    .steps {
      counter-reset: step;
      display: grid;
      gap: 14px;
    }
    .step {
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,250,241,0.9));
    }
    .step h3::before {
      counter-increment: step;
      content: counter(step, decimal-leading-zero) ". ";
      color: var(--accent);
    }
    .muted { color: var(--muted); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--teal); }
    pre {
      margin: 0;
      padding: 16px;
      overflow: auto;
      border-radius: 16px;
      border: 1px solid rgba(35,91,99,0.16);
      background: #1b2528;
      color: #edf4f4;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .two-col {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .note {
      padding: 14px 16px;
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 14px;
      line-height: 1.7;
      font-size: 14px;
    }
    @media (max-width: 900px) {
      .grid, .two-col { grid-template-columns: 1fr; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div id="hero-tags"></div>
      <h1 id="title"></h1>
      <p class="sub" id="summary"></p>
    </section>

    <div class="grid">
      <aside class="sidebar">
        <section class="card">
          <h2 id="overview-title"></h2>
          <ul class="list" id="overview-list"></ul>
        </section>
        <section class="card">
          <h2 id="files-title"></h2>
          <ul class="list" id="files-list"></ul>
        </section>
      </aside>

      <main class="main">
        <section class="card">
          <h2 id="backend-title"></h2>
          <div class="steps" id="backend-steps"></div>
        </section>

        <section class="card">
          <h2 id="workflow-title"></h2>
          <div class="note" id="workflow-note"></div>
          <div class="steps" id="workflow-steps"></div>
        </section>

        <section class="card">
          <h2 id="vars-title"></h2>
          <table>
            <thead>
              <tr>
                <th id="vars-col-1"></th>
                <th id="vars-col-2"></th>
                <th id="vars-col-3"></th>
              </tr>
            </thead>
            <tbody id="vars-body"></tbody>
          </table>
        </section>

        <section class="card">
          <h2 id="prompts-title"></h2>
          <div class="two-col">
            <div>
              <h3 id="planner-title"></h3>
              <pre id="planner-prompt"></pre>
            </div>
            <div>
              <h3 id="evaluator-title"></h3>
              <pre id="evaluator-prompt"></pre>
            </div>
          </div>
          <div style="margin-top:18px;">
            <h3 id="answer-title"></h3>
            <pre id="answer-prompt"></pre>
          </div>
        </section>

        <section class="card">
          <h2 id="json-title"></h2>
          <div class="two-col">
            <div>
              <h3 id="dispatch-title"></h3>
              <pre id="dispatch-json"></pre>
            </div>
            <div>
              <h3 id="response-title"></h3>
              <pre id="response-json"></pre>
            </div>
          </div>
        </section>

        <section class="card">
          <h2 id="test-title"></h2>
          <ul class="list" id="test-list"></ul>
        </section>
      </main>
    </div>
  </div>

  <script>
    const text = {

      summary: "\u8fd9\u4efd\u9875\u9762\u914d\u5957\u5f53\u524d\u5df2\u7ecf\u5b9e\u88c5\u7684 `kg_api` \u540e\u7aef\u3002\u76ee\u6807\u662f\u8ba9\u4f60\u4e0d\u6539 Neo4j \u56fe\u6570\u636e\uff0c\u53ea\u901a\u8fc7 Coze \u5de5\u4f5c\u6d41 + \u540e\u7aef\u7f16\u6392\uff0c\u628a\u201c\u4e3a\u4ec0\u4e48 / \u5982\u4f55 / \u901a\u8fc7 / \u4f20\u5bfc\u201d\u7c7b\u95ee\u9898\u4ece\u77ed\u8def\u5f84\u7b54\u6848\u63d0\u5347\u4e3a\u6559\u5b66\u578b\u673a\u5236\u94fe\u56de\u7b54\u3002",

      overview: [

        "`/query_neighbors` \u73b0\u5728\u8fd4\u56de `paths + edges + readable`\uff0c\u4e0d\u518d\u628a\u591a\u8df3\u8def\u5f84\u538b\u6241\u3002",
        "`/find_path` \u5df2\u6539\u4e3a\u201c\u6709\u5411\u4f18\u5148\uff0c\u65e0\u7ed3\u679c\u518d\u56de\u9000\u65e0\u5411\u201d\u3002",
