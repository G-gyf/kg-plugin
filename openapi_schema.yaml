openapi: 3.0.3
info:
  title: KG Query API
  description: 知识图谱查询服务，供 Coze 智能体调用，支持实体查询、邻居查询、路径发现和模糊搜索。
  version: 1.0.0

servers:
  - url: https://kg-plugin-production.up.railway.app
    description: 生产服务器

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

paths:

  /query_entity:
    post:
      operationId: queryEntity
      summary: 查询实体节点
      description: 按实体名称查询知识图谱中的节点及其全部属性，支持精确和模糊匹配。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entity_name
              properties:
                entity_name:
                  type: string
                  description: 要查询的实体名称，如"商品"、"货币"
                fuzzy:
                  type: boolean
                  default: false
                  description: 是否开启模糊匹配
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                    description: 是否找到实体
                  count:
                    type: integer
                    description: 找到的实体数量
                  message:
                    type: string
                    description: 未找到时的提示信息
                  entities:
                    type: array
                    description: 实体列表
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        labels:
                          type: array
                          items:
                            type: string
                        properties:
                          type: object
                          properties:
                            name:
                              type: string
                            description:
                              type: string
                            type:
                              type: string

  /query_neighbors:
    post:
      operationId: queryNeighbors
      summary: 查询实体的 N 跳邻居
      description: 查询指定实体在知识图谱中的邻居节点和关系，支持深度 1~3 跳。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entity_name
              properties:
                entity_name:
                  type: string
                  description: 起始实体名称
                depth:
                  type: integer
                  default: 1
                  minimum: 1
                  maximum: 3
                  description: 查询深度，1=直接邻居，2=两跳，3=三跳
                rel_type:
                  type: string
                  description: 关系类型过滤，如"包含"、"影响"，不填则查所有关系
                limit:
                  type: integer
                  default: 20
                  maximum: 50
                  description: 返回三元组数量上限
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                  count:
                    type: integer
                  source_entity:
                    type: string
                  depth:
                    type: integer
                  triples:
                    type: array
                    description: 三元组列表
                    items:
                      type: object
                      properties:
                        start:
                          type: object
                          properties:
                            id:
                              type: string
                            labels:
                              type: array
                              items:
                                type: string
                            properties:
                              type: object
                              properties:
                                name:
                                  type: string
                                description:
                                  type: string
                        relationship:
                          type: object
                          properties:
                            type:
                              type: string
                            properties:
                              type: object
                              properties:
                                evidence:
                                  type: string
                        end:
                          type: object
                          properties:
                            id:
                              type: string
                            labels:
                              type: array
                              items:
                                type: string
                            properties:
                              type: object
                              properties:
                                name:
                                  type: string
                                description:
                                  type: string

  /find_path:
    post:
      operationId: findPath
      summary: 查找两实体间最短路径
      description: 查找知识图谱中两个实体之间的最短连接路径，用于多跳推理的路径展示。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - start_entity
                - end_entity
              properties:
                start_entity:
                  type: string
                  description: 起始实体名称
                end_entity:
                  type: string
                  description: 目标实体名称
                max_hops:
                  type: integer
                  default: 4
                  minimum: 1
                  maximum: 6
                  description: 允许的最大跳数
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                  count:
                    type: integer
                  message:
                    type: string
                  paths:
                    type: array
                    description: 路径列表
                    items:
                      type: object
                      properties:
                        hops:
                          type: integer
                          description: 跳数
                        readable:
                          type: string
                          description: 人类可读路径，如"商品 → 货币 → 市场经济"
                        nodes:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              labels:
                                type: array
                                items:
                                  type: string
                              properties:
                                type: object
                                properties:
                                  name:
                                    type: string
                                  description:
                                    type: string
                        relationships:
                          type: array
                          items:
                            type: object
                            properties:
                              type:
                                type: string
                              properties:
                                type: object
                                properties:
                                  evidence:
                                    type: string

  /fuzzy_search:
    post:
      operationId: fuzzySearch
      summary: 实体模糊搜索
      description: 用关键词模糊搜索实体，用于实体消歧，当用户输入名称不精确时获取候选列表。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - keyword
              properties:
                keyword:
                  type: string
                  description: 模糊搜索关键词
                limit:
                  type: integer
                  default: 10
                  maximum: 20
                  description: 返回候选数量
      responses:
        "200":
          description: 搜索成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                  count:
                    type: integer
                  keyword:
                    type: string
                  candidates:
                    type: array
                    description: 候选实体列表
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: 实体名称
                        labels:
                          type: array
                          items:
                            type: string
                        definition:
                          type: string
                          description: 实体定义

  /dispatch:
    post:
      operationId: dispatch
      summary: 统一分发查询
      description: 统一分发接口，由 action 字段路由到对应查询逻辑，供 Coze Workflow 单节点调用。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action
              properties:
                action:
                  type: string
                  description: "操作名称：queryEntity | queryNeighbors | findPath | fuzzySearch"
                entity_name:
                  type: string
                  description: 实体名称（queryEntity / queryNeighbors 时使用）
                fuzzy:
                  type: boolean
                  default: false
                  description: 是否模糊匹配
                depth:
                  type: integer
                  default: 1
                  minimum: 1
                  maximum: 3
                  description: 查询深度（queryNeighbors 时使用）
                limit:
                  type: integer
                  default: 20
                  minimum: 1
                  maximum: 50
                  description: 返回结果上限
                start_entity:
                  type: string
                  description: 起始实体（findPath 时使用）
                end_entity:
                  type: string
                  description: 目标实体（findPath 时使用）
                max_hops:
                  type: integer
                  default: 4
                  minimum: 1
                  maximum: 6
                  description: 最大跳数（findPath 时使用）
                keyword:
                  type: string
                  description: 模糊搜索关键词（fuzzySearch 时使用）
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                    description: 是否找到结果
                  count:
                    type: integer
                    description: 结果数量
                  message:
                    type: string
                    description: 提示信息
                  entities:
                    type: array
                    description: 实体列表（queryEntity 返回）
                    items:
                      type: object
                  triples:
                    type: array
                    description: 三元组列表（queryNeighbors 返回）
                    items:
                      type: object
                  source_entity:
                    type: string
                    description: 查询的源实体名称

  /health:
    get:
      operationId: healthCheck
      summary: 服务健康检查
      description: 检查服务和 Neo4j 连接状态，无需鉴权。
      security: []
      responses:
        "200":
          description: 状态正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: 服务状态，ok 或 error
                  neo4j:
                    type: string
                    description: Neo4j 连接状态
                  timestamp:
                    type: string
                    description: 当前时间
